steps:
  # 1. Build and Push the container image using Kaniko (with caching)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - --destination=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA
      - --destination=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:latest
      - --dockerfile=cicd/release/Dockerfile
      - --context=dir://.
      - --cache=true
      - --cache-ttl=168h

  # 2. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--allow-unauthenticated'
      # 専用のサービスアカウントを使用
      - '--service-account=receipt-scanner-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--remove-env-vars=GOOGLE_APPLICATION_CREDENTIALS'
      # Secret Manager から設定ファイルをマウント
      - '--set-secrets=/secrets/env/.env=APP_DOTENV:latest'

substitutions:
  _REGION: us-central1
  _REPOSITORY: receipt-scanner-repo
  _SERVICE_NAME: receipt-scanner-app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
